# /etc/nginx/sites-available/axona-bridge  — TESTNET variant
#
# Serves the axona-peer app AND fronts the bridge at one origin
# (testnet.axona.net):
#   • normal GETs            → static app files (/var/www/axona-peer-testnet)
#   • WebSocket upgrades on / → proxied to the bridge (127.0.0.1:8080)
#   • /healthz               → bridge (plain HTTP)
#
# The WS-vs-static split uses the error_page-418 trick (an `if` that only
# `return`s is safe in nginx): an Upgrade request is bounced to the @bridge
# named location; everything else is served statically.
#
# Deploy:
#   git clone -b release/2.28.0 https://github.com/axona-net/axona-peer.git /var/www/axona-peer-testnet
#   cp deploy/nginx-testnet-app.conf /etc/nginx/sites-available/axona-bridge
#   # cert paths already match (certbot live/testnet.axona.net); then:
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name testnet.axona.net;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;   # http2 via listen (nginx 1.24 — the standalone `http2 on;` is 1.25.1+)
    server_name testnet.axona.net;

    ssl_certificate     /etc/letsencrypt/live/testnet.axona.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testnet.axona.net/privkey.pem;

    # Static app
    root  /var/www/axona-peer-testnet;
    index index.html;

    # /healthz is the bridge's plain-HTTP health endpoint.
    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        # WebSocket upgrade → bridge; anything else → static files.
        error_page 418 = @bridge;
        if ($http_upgrade) { return 418; }
        try_files $uri $uri/ /index.html;
    }

    location @bridge {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
