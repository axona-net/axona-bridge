# /etc/nginx/sites-available/axona-demo-testnet
#
# Serves the axona-protocol repo (the "live demos" landing page + the examples,
# with the 2.28.0 kernel at /src/) at the testnet DEMO subdomain. The demo must
# be served at a domain ROOT because it imports the kernel via absolute paths
# (/src/index.js, /examples/...). It's PURE STATIC — the pub/sub demo connects
# cross-origin to wss://testnet.axona.net (its host-detect picks that up) and
# gets the testnet TURN from the bridge's welcome. No bridge proxy here.
#
# Deploy (DNS A record demo-testnet.axona.net → droplet first):
#   git clone https://github.com/axona-net/axona-protocol.git /var/www/axona-demo-testnet
#   cp deploy/nginx-testnet-demo.conf /etc/nginx/sites-available/axona-demo-testnet
#   ln -s /etc/nginx/sites-available/axona-demo-testnet /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d demo-testnet.axona.net   # adds the 443 block + cert,
#                                               # sets nginx-authenticator renewal
#
# This ships port-80 only; certbot --nginx adds the TLS server block on first
# run (clean for a static vhost — avoids the ssl-without-cert bootstrap problem).

server {
    listen 80;
    listen [::]:80;
    server_name demo-testnet.axona.net;

    root  /var/www/axona-demo-testnet;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
