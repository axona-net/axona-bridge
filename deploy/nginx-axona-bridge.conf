# /etc/nginx/sites-available/axona-bridge
#
# nginx reverse proxy for the Axona bridge.
# - terminates TLS (Let's Encrypt managed by certbot --nginx)
# - upgrades WebSocket connections through to the Node process on 127.0.0.1:8080
# - forwards /healthz over plain HTTP for monitoring
#
# Install:
#   sudo cp deploy/nginx-axona-bridge.conf /etc/nginx/sites-available/axona-bridge
#   sudo ln -s /etc/nginx/sites-available/axona-bridge /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d bridge.axona.net   # provisions cert + rewrites this file
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name bridge.axona.net;

    # certbot will rewrite this to redirect to HTTPS after provisioning the cert.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bridge.axona.net;

    # ── TLS (managed by certbot) ─────────────────────────────────────
    # certbot --nginx will fill in the certificate paths after first run.
    # ssl_certificate     /etc/letsencrypt/live/bridge.axona.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/bridge.axona.net/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── WebSocket upgrade + HTTP pass-through ────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived; default 60s would
        # tear them down well before any application timeout.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # /healthz is plain HTTP; same proxy works fine.
    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        proxy_set_header Host $host;
        access_log off;
    }
}
